name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
          - os: macos-latest
            platform: darwin/universal
          - os: ubuntu-latest
            platform: linux/amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # Linux dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      # Windows: install NSIS for installer
      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis -y
        shell: pwsh

      # Build
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: wails build -platform ${{ matrix.platform }} -tags webkit2_41

      - name: Build (non-Linux)
        if: runner.os != 'Linux'
        run: wails build -platform ${{ matrix.platform }}

      # ── Windows packaging ──

      - name: Build NSIS Installer
        if: runner.os == 'Windows'
        run: |
          $env:PATH += ";${env:ProgramFiles(x86)}\NSIS"
          $version = "${{ github.ref_name }}".TrimStart("v")
          (Get-Content build\windows\installer\project.nsi) -replace '1\.0\.0', $version | Set-Content build\windows\installer\project.nsi
          makensis build\windows\installer\project.nsi
        shell: pwsh

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          Compress-Archive -Path build/bin/SnmpLens.exe -DestinationPath SnmpLens-windows-amd64-portable.zip
          Move-Item "SnmpLens-${version}-setup.exe" "SnmpLens-windows-amd64-setup.exe"
        shell: pwsh

      # ── macOS packaging ──

      - name: Package (macOS .zip)
        if: runner.os == 'macOS'
        run: cd build/bin && zip -r ../../SnmpLens-macos-universal.zip SnmpLens.app

      - name: Package (macOS .dmg)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dmg-stage
          cp -R build/bin/SnmpLens.app dmg-stage/
          ln -s /Applications dmg-stage/Applications
          hdiutil create -volname "SnmpLens" -srcfolder dmg-stage -ov -format UDZO SnmpLens-macos-universal.dmg

      # ── Linux packaging ──

      - name: Package (Linux .tar.gz)
        if: runner.os == 'Linux'
        run: tar -czf SnmpLens-linux-amd64.tar.gz -C build/bin SnmpLens

      - name: Package (Linux .deb)
        if: runner.os == 'Linux'
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          mkdir -p deb-pkg/DEBIAN
          mkdir -p deb-pkg/usr/local/bin
          mkdir -p deb-pkg/usr/share/applications
          mkdir -p deb-pkg/usr/share/icons/hicolor/256x256/apps

          cp build/bin/SnmpLens deb-pkg/usr/local/bin/snmplens
          chmod 755 deb-pkg/usr/local/bin/snmplens

          cp SnmpLens.png deb-pkg/usr/share/icons/hicolor/256x256/apps/snmplens.png

          cat > deb-pkg/DEBIAN/control << EOF
          Package: snmplens
          Version: ${VERSION}
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0
          Maintainer: Geoffrey Lecoq
          Description: SNMP MIB Browser and Network Management Tool
           A modern desktop application for SNMP operations, MIB browsing,
           trap listening, network discovery, and real-time monitoring.
          EOF
          sed -i 's/^          //' deb-pkg/DEBIAN/control

          cat > deb-pkg/usr/share/applications/snmplens.desktop << EOF
          [Desktop Entry]
          Name=SnmpLens
          Comment=SNMP MIB Browser and Network Management
          Exec=/usr/local/bin/snmplens
          Icon=snmplens
          Type=Application
          Categories=Network;System;Monitor;
          Terminal=false
          EOF
          sed -i 's/^          //' deb-pkg/usr/share/applications/snmplens.desktop

          dpkg-deb --build deb-pkg "SnmpLens-linux-amd64.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnmpLens-${{ runner.os }}
          path: |
            SnmpLens-*.zip
            SnmpLens-*.tar.gz
            SnmpLens-*-setup.exe
            SnmpLens-*.dmg
            SnmpLens-*.deb

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/SnmpLens-windows-amd64-portable.zip
            artifacts/SnmpLens-windows-amd64-setup.exe
            artifacts/SnmpLens-macos-universal.zip
            artifacts/SnmpLens-macos-universal.dmg
            artifacts/SnmpLens-linux-amd64.tar.gz
            artifacts/SnmpLens-linux-amd64.deb
