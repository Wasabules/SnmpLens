name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build (${{ matrix.os }})
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            platform: windows/amd64
          - os: ubuntu-latest
            platform: linux/amd64
          - os: macos-latest
            platform: darwin/universal

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      # Wails build generates bindings + builds frontend + compiles Go
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: wails build -platform ${{ matrix.platform }} -tags webkit2_41

      - name: Build (non-Linux)
        if: runner.os != 'Linux'
        run: wails build -platform ${{ matrix.platform }}

      # Go checks (only on Linux to avoid redundant runs)
      - name: Go vet
        if: runner.os == 'Linux'
        run: go vet -tags webkit2_41 ./...

      - name: Install staticcheck
        if: runner.os == 'Linux'
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        if: runner.os == 'Linux'
        run: staticcheck ./...

      - name: Check go.mod tidy
        if: runner.os == 'Linux'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit
        run: cd frontend && npm audit --omit=dev || true
